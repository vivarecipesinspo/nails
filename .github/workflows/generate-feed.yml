name: Generate Pinterest RSS Feed

on:
  schedule:
    - cron: '0 1 * * *' # Menjalankan sekali setiap hari jam 1 pagi (UTC)
  workflow_dispatch: # Tombol untuk menjalankan manual

jobs:
  build-feed:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Generate feed.xml
        shell: python
        run: |
          import os
          import random
          import html
          from datetime import datetime, timezone
          from xml.etree.ElementTree import Element, SubElement, tostring
          from xml.dom import minidom
          import urllib.parse
          import urllib.request 
          import urllib.error

          # --- 1. Konfigurasi Awal ---
          SPINTEXT = ['Best', 'Beautiful', 'Stunning', 'Gorgeous', 'Trendy', 'Elegant', 'Cute', 'Amazing', 'Stylish', 'Chic', 'Glamorous', 'Flawless', 'Unique', 'Creative', 'Inspiring', 'Perfect', 'Fabulous', 'Eye-catching', 'Modern', 'Classy']
          
          # --- 2. Baca Semua File Konten ---
          keyword_url = "https://seribudollarperhari.github.io/banner/nails.txt"
          
          try:
              with open('domain.txt', 'r') as f:
                  domain = f.read().strip()
              
              print(f"⬇️  Mengambil keywords dari URL: {keyword_url}")
              with urllib.request.urlopen(keyword_url) as response:
                  keywords_content = response.read().decode('utf-8')
                  keywords = [line.strip() for line in keywords_content.splitlines() if line.strip()]
              print(f"👍 Berhasil mendapatkan {len(keywords)} keywords.")

              with open('deskripsi.txt', 'r', encoding='utf-8') as f:
                  descriptions_templates = [desc.strip() for desc in f.read().split('---') if desc.strip()]
          
          except FileNotFoundError as e:
              print(f"❌ Error: File lokal {e.filename} tidak ditemukan.")
              exit(1)
          except urllib.error.URLError as e:
              print(f"❌ Error saat mengambil keywords dari URL: {e.reason}")
              exit(1)

          # --- 3. Buat Struktur Dasar RSS Feed ---
          rss = Element('rss', version='2.0')
          channel = SubElement(rss, 'channel')
          SubElement(channel, 'title').text = f'Nail Art Ideas from {domain}'
          SubElement(channel, 'link').text = f"https://{domain}"
          SubElement(channel, 'description').text = 'A collection of stunning nail art ideas and inspiration.'
          SubElement(channel, 'pubDate').text = datetime.now(timezone.utc).strftime('%a, %d %b %Y %H:%M:%S GMT')

          # --- 4. Loop untuk Membuat 150 Item Artikel ---
          random.shuffle(keywords)
          print(f"📝 Menghasilkan 150 item untuk feed...")

          for keyword in keywords[:150]:
              random_prefix = random.choice(SPINTEXT)
              # Judul tetap menggunakan prefix agar menarik untuk klik
              title = f"{random_prefix} {keyword.title()}"
              
              description_template = random.choice(descriptions_templates)
              description_text = description_template.replace('%keyword%', keyword.title())
              
              url_keyword = keyword.replace(' ', '-').lower()
              link = f"https://{domain}/detail.html?q={url_keyword}"

              # --- PERUBAHAN DIMULAI DI SINI ---
              # Kueri gambar murni dari keyword tanpa random_prefix
              image_query = keyword
              encoded_image_query = urllib.parse.quote(image_query)
              
              # Menghasilkan angka acak dari 1 sampai 10 untuk variasi hasil gambar no 1 hingga 10
              random_position = random.randint(1, 10)
              
              # Memasukkan angka acak ke dalam parameter 'p'
              image_url = f"https://tse1.mm.bing.net/th?q={encoded_image_query}&w=800&h=1200&c=7&rs=1&p={random_position}"
              # --- PERUBAHAN SELESAI ---
              
              item = SubElement(channel, 'item')
              SubElement(item, 'title').text = title
              SubElement(item, 'link').text = link
              SubElement(item, 'description').text = description_text
              SubElement(item, 'pubDate').text = datetime.now(timezone.utc).strftime('%a, %d %b %Y %H:%M:%S GMT')
              
              SubElement(item, 'enclosure', {
                  'url': image_url,
                  'type': 'image/jpeg'
              })

          # --- 5. Tulis ke File feed.xml ---
          xml_str = tostring(rss, encoding='unicode')
          dom = minidom.parseString(xml_str)
          pretty_xml_str = dom.toprettyxml(indent="  ")
          final_xml_output = pretty_xml_str.lstrip()
          
          with open('feed.xml', 'w', encoding='utf-8') as f:
              f.write(final_xml_output)
          
          print("✅ File feed.xml berhasil dibuat dengan gambar berdasarkan murni keyword (diacak posisi 1-10).")

      - name: Commit and Push feed.xml
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add feed.xml
          if git diff --staged --quiet; then
            echo "✅ Feed tidak berubah. Tidak ada yang di-commit."
          else
            git commit -m "chore: Update RSS feed to use pure keyword for image and randomize index 1-10"
            git push
          fi
